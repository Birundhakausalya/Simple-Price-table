<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Calender🗓️</title>
    <link rel="icon" href="https://cdn.pixabay.com/photo/2019/01/01/14/55/calendar-3906791_960_720.jpg">
    <style>
        body{
            background-color: aquamarine;
            width:100%;
            height: 100vh;
            font-family: arial;
           
        }
        h1{
            background-color: black;
            text-align: center;
            background:white;
            margin-top: 50px;
        }
        table{
            border-collapse: collapse;
            margin: 40px auto;
            width:60%;
            background:white;
            box-shadow: 0 5px 15px rgba(red, green, blue, alpha);
        }
        th,td{
            border: 1px solid black;
            padding: 15px;
            text-align:center;
        }
        th{
            background:rgb(218, 218, 4);
            color: white;
        }
        td:hover{
            background: lightcoral;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Daily Calender</h1>
    <h1>March 2026</h1>
    <table>
        <tr>
        <th>Sunday</th>
        <th>Monday</th>
        <th>Tuesday</th>
        <th>Wednesday</th>
        <th>Thursday</th>
        <th>Friday</th>
        <th>Saturday</th>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td>1</td>
            <td>2</td>
        </tr>
        <tr>
            <td style="background-color: blueviolet;">3</td>
            <td>4</td>
            <td>5</td>
            <td>6</td>
            <td>7</td>
            <td>8</td>
            <td>9</td>
        </tr>
        <tr>
            <td>10</td>
            <td>11</td>
            <td>12</td>
            <td>13</td>
            <td>14</td>
            <td>15</td>
            <td>16</td>
        </tr>
        <tr>
            <td>17</td>
            <td>18</td>
            <td>19</td>
            <td>20</td>
            <td>21</td>
            <td>22</td>
            <td>23</td>
        </tr>
        <tr>
            <td>24</td>
            <td>25</td>
            <td>26</td>
            <td>27</td>
            <td>28</td>
            <td>29</td>
            <td>30</td>
        </tr>
        <tr>
            <td>31</td>
            <td colspan="6"></td>
        </tr>
    </table>
</body>
</html>
