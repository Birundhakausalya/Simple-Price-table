<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Pricing Table</title>
    <link rel="icon" href="/img.png">
    <style>
        .pricing-table{
              display: flex;
              justify-content: center;
              gap: 20px;
              font-family: arial;
              margin-top: 50px;  
        }
        .pricing-card{
            border: 1px dotted red;
            border-radius: 10px;
            padding: 20px;
            width: 200px;
            text-align: center;
            box-shadow: 0 4px 8px rgb(red, green, blue);
            transition: transform 0.3s;
        }
        .pricing-card:hover{
            transform:translateY(-15px);
        }
        .popular{
            border: 2px solid blue;
        }
        .price{
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }
        .pricing-card ul{
            list-style:none;
            padding:0;
            text-align: left;
        }
        .pricing-card ul li{
            margin: 8px 0;
        }
        .pricing-card button{
            padding:10px 20px;
            border: none;
            border-radius: 5px;
            background-color: rgb(23, 187, 193);
            color:white;
            cursor: pointer;
        }
        .pricing-card button:hover{
            background-color: pink;
        }
    </style>
</head>
<body>
    <div class="pricing-table">
        <div class="pricing-card">
            <h2>Basic</h2>
            <p class="price">₹10,000/month</p>
            <ul>
                <li>1 Project</li>
                <li>5G Storage</li>
                <li>Email Support</li>
            </ul>
            <button>Select</button>
        </div>
        <div class="pricing-card">
            <h2>pro</h2>
            <p class="price">₹30,000/month</p>
            <ul>
                <li>10 Projects</li>
                <li>50GB Storage</li>
                <li>Priority Support</li>
            </ul>
            <button>Select</button>
        </div>
        <div class="pricing-card popular">
            <h2>premium</h2>
            <p class="price">₹50,000 / month</p>
            <ul>
                <li>Unlimited Projects</li>
                <li>200GB Storage</li>
                <li>24/7 Support</li>
            </ul>
            <button>Select</button>
        </div>
    </div>
</body>
</html>
